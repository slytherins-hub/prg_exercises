site_name: PRG
site_description: Podklady ke cvičením
docs_dir: docs
theme:
  name: material
  language: cs
  palette:
    - scheme: default
      primary: blue
      accent: teal
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

markdown_extensions:
  - sane_lists
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Rozcestník: README.md
  - Cvičení 1:
    - Přehled: cviceni_01/README.md
    - Úvod: cviceni_01/01_úvod.md
    - Cíl 1 – instalace a příprava prostředí (uv): cviceni_01/02_cíl_1_instalace_a_příprava_prostředí_uv.md
    - Cíl 2 – první program a základy syntaxe: cviceni_01/03_cíl_2_první_program_a_základy_syntaxe.md
    - Cíl 3 – pokročilé podmínky: cviceni_01/04_cíl_3_pokročilé_podmínky.md
    - Cíl 4 – kombinace cyklů a podmínek: cviceni_01/05_cíl_4_kombinace_cyklu_a_podmínek.md
    - Závěrečné úkoly: cviceni_01/06_závěrečné_úkoly.md
    - Bonusové úkoly: cviceni_01/07_bonusové_úkoly.md
