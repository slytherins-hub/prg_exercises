site_name: PRG
site_description: Podklady ke cvičením
docs_dir: docs
theme:
  name: material
  language: cs
  custom_dir: overrides
  palette:
    - scheme: default
      primary: blue
      accent: teal
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

markdown_extensions:
  - sane_lists
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tabbed:
      alternate_style: true

