          - heading "Proč se o AI nástroje zajímat?" [level=3] [ref=e424]
          - paragraph [ref=e425]: Pokud jsi někdy kopíroval kód do ChatGPT, čekal na odpověď, kopíroval ji zpátky do editoru, spustil, dostal chybu a celý cyklus opakoval – víš, jak je to pomalé. AI nástroje pro programování tento cyklus dramaticky zkracují nebo úplně odstraňují.
          - paragraph [ref=e426]: "Nejde jen o to psát kód rychleji. AI nástroje dnes umí:"
          - list [ref=e427]:
            - listitem [ref=e428]:
              - strong [ref=e429]: vysvětlit
              - text: existující kód, který jsi nenapsal ty,
            - listitem [ref=e430]:
              - strong [ref=e431]: najít a opravit
              - text: chyby v programu,
            - listitem [ref=e432]:
              - strong [ref=e433]: navrhnout
              - text: strukturu projektu,
            - listitem [ref=e434]:
